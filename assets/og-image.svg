<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2350"/>
      <stop offset="55%" stop-color="#6d3b6e"/>
      <stop offset="100%" stop-color="#ff8a3d"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff3c4"/>
      <stop offset="60%" stop-color="#ffd36b"/>
      <stop offset="100%" stop-color="#ffb347"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#sky)"/>

  <!-- sun -->
  <circle cx="980" cy="330" r="150" fill="url(#sun)"/>
  <g stroke="#ffd36b" stroke-width="10" stroke-linecap="round" opacity="0.85">
    <line x1="980" y1="120" x2="980" y2="60"/>
    <line x1="980" y1="540" x2="980" y2="600"/>
    <line x1="770" y1="330" x2="710" y2="330"/>
    <line x1="1190" y1="330" x2="1250" y2="330"/>
    <line x1="833" y1="183" x2="790" y2="140"/>
    <line x1="1127" y1="183" x2="1170" y2="140"/>
    <line x1="833" y1="477" x2="790" y2="520"/>
    <line x1="1127" y1="477" x2="1170" y2="520"/>
  </g>

  <!-- title -->
  <text x="90" y="250" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="92" font-weight="bold" fill="#ffffff">Sunshine Bot</text>
  <text x="92" y="312" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="34" fill="#ffe7c2">Specific, earned praise — read from your own git history.</text>

  <!-- sample compliment chip -->
  <rect x="90" y="372" width="700" height="150" rx="18" fill="#000000" opacity="0.28"/>
  <text x="118" y="423" font-family="DejaVu Sans Mono, monospace" font-size="24" fill="#ffd36b">simplicity · a6b639b</text>
  <text x="118" y="462" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="25" fill="#ffffff">"Chose subtraction — deleting code is</text>
  <text x="118" y="496" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="25" fill="#ffffff">underrated craft."</text>

  <!-- footer -->
  <text x="90" y="592" font-family="DejaVu Sans, Helvetica, Arial, sans-serif" font-size="26" fill="#ffe7c2" opacity="0.9">github.com/dwellchecker/sunshine-bot</text>
</svg>
